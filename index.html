<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для моей любимой Лизы 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ffe3e3 0%, #fff0f0 100%);
            font-family: 'Comfortaa', cursive;
            color: #4a4a4a;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Намного больше летающих сердечек */
        .hearts-container {
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }
        .heart {
            position: absolute;
            display: block;
            background: rgba(255, 105, 140, 0.45);
            animation: floatUp 15s linear infinite;
            bottom: -100px;
            clip-path: path('M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z');
        }

        /* Особые быстрые сердечки для кликов */
        .click-heart {
            position: absolute;
            z-index: 999;
            pointer-events: none;
            background: rgba(255, 71, 108, 0.8);
            clip-path: path('M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z');
            animation: clickFloat 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg) scale(0.5);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 0.8; }
            100% {
                transform: translateY(-110vh) rotate(360deg) scale(1.2);
                opacity: 0;
            }
        }

        @keyframes clickFloat {
            0% {
                transform: translate(-50%, -50%) scale(0.3);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -150px) scale(1.5) rotate(15deg);
                opacity: 0;
            }
        }

        .container {
            z-index: 1;
            width: 90%;
            max-width: 400px;
            margin: 20px auto;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            border-radius: 35px;
            box-shadow: 0 15px 35px rgba(255, 182, 193, 0.4);
            padding: 25px;
            text-align: center;
            box-sizing: border-box;
            border: 2px solid rgba(255, 182, 193, 0.6);
        }

        /* Интерактивный счетчик отношений */
        .love-counter {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 12px;
            box-shadow: 0 5px 15px rgba(255, 182, 193, 0.2);
            margin-bottom: 20px;
            border: 1px solid #ffe3e3;
        }
        .counter-title {
            font-size: 11px;
            color: #ff5e7e;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            font-weight: bold;
        }
        .counter-time {
            font-size: 13px;
            color: #4a4a4a;
        }
        .counter-time b {
            color: #ff476c;
        }

        /* Улучшенный плеер */
        .player-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(255, 182, 193, 0.15);
            margin-bottom: 20px;
            border: 1px solid #ffe3e3;
        }

        /* Горизонтальный список плейлистов */
        .playlists-tabs {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 5px 5px 15px 5px;
            margin-bottom: 15px;
            scrollbar-width: none;
        }
        .playlists-tabs::-webkit-scrollbar {
            display: none;
        }
        .playlist-tab {
            flex: 0 0 75px;
            cursor: pointer;
            text-align: center;
            transition: transform 0.2s;
        }
        .playlist-tab-img {
            width: 55px;
            height: 55px;
            border-radius: 16px;
            background-size: cover;
            background-position: center;
            border: 2px solid white;
            box-shadow: 0 4px 8px rgba(255, 182, 193, 0.3);
            margin: 0 auto 5px auto;
            transition: transform 0.2s, border-color 0.2s;
        }
        .playlist-tab.active .playlist-tab-img {
            border-color: #ff5e7e;
            transform: scale(1.08);
            box-shadow: 0 4px 12px rgba(255, 94, 126, 0.4);
        }
        .playlist-tab-name {
            font-size: 9px;
            color: #555;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 75px;
            font-weight: bold;
        }

        .vinyl-container {
            width: 140px;
            height: 140px;
            margin: 0 auto 10px auto;
            position: relative;
        }

        .vinyl {
            width: 100%;
            height: 100%;
            background: #1c1c1c;
            border-radius: 50%;
            border: 6px solid #ffd1d8;
            box-shadow: 0 6px 15px rgba(0,0,0,0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: spin 6s linear infinite;
            animation-play-state: paused;
            transition: border-color 0.3s;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .vinyl-cover {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            border: 2px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        /* Анимированный эквалайзер под обложкой */
        .equalizer {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 4px;
            height: 20px;
            margin: 8px 0 12px 0;
        }
        .eq-bar {
            width: 3px;
            height: 4px;
            background-color: #ff5e7e;
            border-radius: 3px;
            animation: bounce 0.8s ease-in-out infinite alternate;
            animation-play-state: paused;
        }
        .eq-bar:nth-child(2) { animation-delay: 0.15s; animation-duration: 0.6s; }
        .eq-bar:nth-child(3) { animation-delay: 0.3s; animation-duration: 0.9s; }
        .eq-bar:nth-child(4) { animation-delay: 0.1s; animation-duration: 0.7s; }
        .eq-bar:nth-child(5) { animation-delay: 0.4s; animation-duration: 0.5s; }

        @keyframes bounce {
            0% { height: 4px; }
            100% { height: 20px; }
        }

        .track-info {
            margin-bottom: 10px;
        }
        .track-title {
            font-weight: bold;
            font-size: 15px;
            color: #333;
        }
        .track-sub {
            font-size: 11px;
            color: #888;
            margin-top: 3px;
        }

        /* Ползунок перемотки */
        .timeline-container {
            margin: 15px 0 10px 0;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            accent-color: #ff5e7e;
            background: #ffe3e3;
            border-radius: 5px;
            cursor: pointer;
            outline: none;
            border: none;
        }
        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #999;
            margin-top: 4px;
        }

        /* Элементы управления */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 10px;
        }

        .btn-control {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn-control:active {
            transform: scale(0.85);
        }

        .btn-play {
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            border: none;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255, 94, 126, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Секция ИИ записок */
        .ai-section {
            background: #fff;
            border-radius: 22px;
            padding: 20px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.03);
            border: 1px solid #ffe3e3;
        }

        .message-box {
            min-height: 80px;
            border: 2px dashed #ffb3b3;
            border-radius: 16px;
            padding: 15px;
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 15px;
            background: #fffafa;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
        }

        .btn-generate {
            background: linear-gradient(45deg, #ff758c, #ff476c);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            font-family: 'Comfortaa', cursive;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 71, 108, 0.3);
            transition: 0.2s;
            width: 100%;
        }
        .btn-generate:disabled {
            background: #ddd;
            box-shadow: none;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="hearts-container" id="heartsContainer"></div>

    <div class="container">
        <!-- Интерактивный счетчик отношений -->
        <div class="love-counter">
            <div class="counter-title">Тёма & Лиза 💞</div>
            <div class="counter-time" id="counterTime">Загружаем время счастья...</div>
        </div>

        <!-- Плеер -->
        <div class="player-card">
            
            <!-- Горизонтальные вкладки плейлистов -->
            <div class="playlists-tabs" id="playlistsTabs">
                <!-- Вкладки загружаются автоматически -->
            </div>

            <div class="vinyl-container">
                <div class="vinyl" id="vinyl">
                    <div class="vinyl-cover" id="vinylCover">❤️</div>
                </div>
            </div>

            <!-- Анимированный эквалайзер -->
            <div class="equalizer">
                <div class="eq-bar" id="eq1"></div>
                <div class="eq-bar" id="eq2"></div>
                <div class="eq-bar" id="eq3"></div>
                <div class="eq-bar" id="eq4"></div>
                <div class="eq-bar" id="eq5"></div>
            </div>
            
            <div class="track-info">
                <div class="track-title" id="trackTitle">Загрузка плейлистов...</div>
                <div class="track-sub" id="trackSub">Пожалуйста, подожди 💕</div>
            </div>

            <!-- Шкала перемотки -->
            <div class="timeline-container">
                <input type="range" class="progress-bar" id="progressBar" value="0" min="0" max="100">
                <div class="time-info">
                    <span id="currentTime">0:00</span>
                    <span id="totalTime">0:00</span>
                </div>
            </div>

            <!-- Управление -->
            <div class="controls">
                <button class="btn-control" onclick="prevTrack()">⏮️</button>
                <button class="btn-play" id="playBtn">▶️</button>
                <button class="btn-control" onclick="nextTrack()">⏭️</button>
            </div>

            <audio id="audio"></audio>
        </div>

        <!-- Послания от Тёмы -->
        <div class="ai-section">
            <div class="message-box" id="messageBox">
                Нажми на кнопку ниже, чтобы получить теплое послание, которое я создал специально для тебя... 💌
            </div>
            <button class="btn-generate" id="genBtn" onclick="generateMessage()">Получить милость от Тёмы ✨</button>
        </div>
    </div>

    <script>
        // --- 1. НАСТРОЙКА ИСТОЧНИКА ---
        const GH_USER = "Traxshbot";
        const GH_REPO = "liza-love-app";

        // --- 2. НАСТРОЙКА ДАТЫ ОТНОШЕНИЙ (НАСТРОЕНО НА 29.05.2026) ---
        const startLoveDate = new Date(2026, 4, 29, 0, 0); 

        function updateLoveCounter() {
            const now = new Date();
            const diff = now - startLoveDate;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((diff / (1000 * 60)) % 60);
            const seconds = Math.floor((diff / 1000) % 60);

            document.getElementById('counterTime').innerHTML = 
                `Мы вместе: <b>${days}д</b> ${hours}ч ${minutes}м ${seconds}с`;
        }
        setInterval(updateLoveCounter, 1000);
        updateLoveCounter();


        let playlists = [];
        let currentPlaylistIndex = 0;
        let currentTrackIndex = 0;

        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const vinyl = document.getElementById('vinyl');
        const vinylCover = document.getElementById('vinylCover');
        const trackTitle = document.getElementById('trackTitle');
        const trackSub = document.getElementById('trackSub');
        const progressBar = document.getElementById('progressBar');
        const currentTimeText = document.getElementById('currentTime');
        const totalTimeText = document.getElementById('totalTime');
        const playlistsTabs = document.getElementById('playlistsTabs');
        const eqBars = document.querySelectorAll('.eq-bar');

        const fallbackPlaylists = [{
            name: "Любимое 💖",
            cover: "https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=300",
            tracks: [{
                title: "Наша особенная песня ✨",
                artist: "С любовью от Тёмы",
                src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
                cover: "https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=300"
            }]
        }];

        // Сканирование плейлистов из GitHub
        async function fetchPlaylists() {
            const cached = localStorage.getItem('liza_playlists_data');
            const cacheTime = localStorage.getItem('liza_playlists_time');
            
            if (cached && cacheTime && (Date.now() - cacheTime < 10 * 60 * 1000)) { 
                return JSON.parse(cached);
            }

            try {
                const response = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/git/trees/main?recursive=1`);
                if (!response.ok) throw new Error("Не удалось получить структуру файлов");
                
                const data = await response.json();
                const tree = data.tree || [];
                const playlistsMap = {};

                const musicFiles = tree.filter(item => item.path.startsWith('music/') && item.type === 'blob');

                musicFiles.forEach(file => {
                    const parts = file.path.split('/');
                    if (parts.length < 3) return;

                    const playlistName = parts[1];
                    const fileName = parts[2];

                    if (!playlistsMap[playlistName]) {
                        playlistsMap[playlistName] = {
                            name: playlistName,
                            cover: "https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=300",
                            tracks: []
                        };
                    }

                    const rawUrl = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/main/${encodeURIComponent(file.path)}`;
                    const lowerName = fileName.toLowerCase();

                    if (lowerName === 'cover.jpg' || lowerName === 'cover.png' || lowerName === 'cover.jpeg') {
                        playlistsMap[playlistName].cover = rawUrl;
                    }
                });

                musicFiles.forEach(file => {
                    const parts = file.path.split('/');
                    if (parts.length < 3) return;

                    const playlistName = parts[1];
                    const fileName = parts[2];

                    if (fileName.toLowerCase().endsWith('.mp3')) {
                        const nameWithoutExt = fileName.slice(0, -4);
                        const songParts = nameWithoutExt.split(' - ');
                        const artist = songParts[0] || "Тёма";
                        const title = songParts[1] || nameWithoutExt;

                        const songCoverJpg = nameWithoutExt + '.jpg';
                        const songCoverPng = nameWithoutExt + '.png';
                        const specificCoverFile = musicFiles.find(f => {
                            const fParts = f.path.split('/');
                            return fParts[1] === playlistName && 
                                   (fParts[2].toLowerCase() === songCoverJpg.toLowerCase() || fParts[2].toLowerCase() === songCoverPng.toLowerCase());
                        });

                        const rawSongUrl = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/main/${encodeURIComponent(file.path)}`;
                        
                        const trackCover = specificCoverFile 
                            ? `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/main/${encodeURIComponent(specificCoverFile.path)}` 
                            : playlistsMap[playlistName].cover;

                        playlistsMap[playlistName].tracks.push({
                            title: title,
                            artist: artist,
                            src: rawSongUrl,
                            cover: trackCover
                        });
                    }
                });

                const playlistsList = Object.values(playlistsMap).filter(p => p.tracks.length > 0);
                if (playlistsList.length === 0) return fallbackPlaylists;

                localStorage.setItem('liza_playlists_data', JSON.stringify(playlistsList));
                localStorage.setItem('liza_playlists_time', Date.now());

                return playlistsList;
            } catch (e) {
                console.error("Ошибка построения дерева плейлистов:", e);
                return fallbackPlaylists;
            }
        }

        function renderPlaylists() {
            playlistsTabs.innerHTML = '';
            playlists.forEach((pl, idx) => {
                const tab = document.createElement('div');
                tab.classList.add('playlist-tab');
                if (idx === currentPlaylistIndex) tab.classList.add('active');
                tab.onclick = (e) => {
                    e.stopPropagation(); 
                    selectPlaylist(idx);
                };

                tab.innerHTML = `
                    <div class="playlist-tab-img" style="background-image: url('${pl.cover}')"></div>
                    <div class="playlist-tab-name">${pl.name}</div>
                `;
                playlistsTabs.appendChild(tab);
            });
        }

        function selectPlaylist(index) {
            currentPlaylistIndex = index;
            currentTrackIndex = 0;
            
            const tabs = document.querySelectorAll('.playlist-tab');
            tabs.forEach((tab, i) => {
                if (i === index) tab.classList.add('active');
                else tab.classList.remove('active');
            });

            loadTrack(currentTrackIndex);
            
            if (playBtn.textContent === '⏸️') {
                audio.play();
                vinyl.style.animationPlayState = 'running';
                setEqState(true);
            }
            spawnHeartsBurst(8);
        }

        async function initPlayer() {
            playlists = await fetchPlaylists();
            renderPlaylists();
            loadTrack(currentTrackIndex);
        }

        function loadTrack(trackIdx) {
            if (playlists.length === 0) return;
            const currentPlaylist = playlists[currentPlaylistIndex];
            if (!currentPlaylist || currentPlaylist.tracks.length === 0) return;

            const track = currentPlaylist.tracks[trackIdx];
            audio.src = track.src;
            trackTitle.textContent = track.title;
            trackSub.textContent = track.artist;
            vinylCover.style.backgroundImage = `url('${track.cover}')`;
            vinylCover.textContent = '';
            progressBar.value = 0;
        }

        initPlayer();

        function setEqState(isPlaying) {
            eqBars.forEach(bar => {
                bar.style.animationPlayState = isPlaying ? 'running' : 'paused';
            });
        }

        playBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (audio.paused) {
                audio.play();
                playBtn.textContent = '⏸️';
                vinyl.style.animationPlayState = 'running';
                setEqState(true);
                spawnHeartsBurst(10);
            } else {
                audio.pause();
                playBtn.textContent = '▶️';
                vinyl.style.animationPlayState = 'paused';
                setEqState(false);
            }
        });

        function nextTrack() {
            const currentPlaylist = playlists[currentPlaylistIndex];
            if (!currentPlaylist) return;

            currentTrackIndex = (currentTrackIndex + 1) % currentPlaylist.tracks.length;
            loadTrack(currentTrackIndex);
            audio.play();
            playBtn.textContent = '⏸️';
            vinyl.style.animationPlayState = 'running';
            setEqState(true);
            spawnHeartsBurst(10);
        }

        function prevTrack() {
            const currentPlaylist = playlists[currentPlaylistIndex];
            if (!currentPlaylist) return;

            currentTrackIndex = (currentTrackIndex - 1 + currentPlaylist.tracks.length) % currentPlaylist.tracks.length;
            loadTrack(currentTrackIndex);
            audio.play();
            playBtn.textContent = '⏸️';
            vinyl.style.animationPlayState = 'running';
            setEqState(true);
            spawnHeartsBurst(10);
        }

        audio.addEventListener('ended', nextTrack);

        audio.addEventListener('timeupdate', () => {
            if (!isNaN(audio.duration)) {
                const progress = (audio.currentTime / audio.duration) * 100;
                progressBar.value = progress;
                currentTimeText.textContent = formatTime(audio.currentTime);
                totalTimeText.textContent = formatTime(audio.duration);
            }
        });

        progressBar.addEventListener('input', () => {
            if (!isNaN(audio.duration)) {
                const newTime = (progressBar.value / 100) * audio.duration;
                audio.currentTime = newTime;
            }
        });

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }


        // --- 3. СИСТЕМА ЛЕТАЮЩИХ СЕРДЕЧЕК И КЛИКОВ ---
        const heartsContainer = document.getElementById('heartsContainer');

        function spawnHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            
            const size = Math.random() * 20 + 10;
            heart.style.width = `${size}px`;
            heart.style.height = `${size}px`;
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDelay = Math.random() * 5 + 's';
            heart.style.animationDuration = Math.random() * 8 + 8 + 's';
            
            const colors = ['rgba(255, 71, 108, 0.45)', 'rgba(255, 117, 140, 0.45)', 'rgba(255, 153, 172, 0.45)'];
            heart.style.background = colors[Math.floor(Math.random() * colors.length)];

            heartsContainer.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 16000);
        }

        for (let i = 0; i < 35; i++) {
            spawnHeart();
        }
        setInterval(spawnHeart, 450);

        function spawnHeartsBurst(count) {
            for (let i = 0; i < count; i++) {
                setTimeout(spawnHeart, i * 50);
            }
        }

        document.body.addEventListener('click', (e) => {
            const heart = document.createElement('div');
            heart.classList.add('click-heart');
            
            const size = Math.random() * 15 + 15; 
            heart.style.width = `${size}px`;
            heart.style.height = `${size}px`;
            
            heart.style.left = `${e.clientX}px`;
            heart.style.top = `${e.clientY}px`;
            
            document.body.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 1200); 
        });


        // --- 4. ГЕНЕРАТОР МИЛОСТЕЙ ОТ ТЁМЫ ---
        async function generateMessage() {
            const messageBox = document.getElementById('messageBox');
            const genBtn = document.getElementById('genBtn');
            
            messageBox.innerHTML = "✨ Тёма сочиняет для тебя что-то волшебное...";
            genBtn.disabled = true;
            spawnHeartsBurst(15);

            const systemPrompt = "Ты — любящий парень по имени Тёма. Твоя единственная цель — написать твоей любимой девушке Лизе невероятно нежное, ласковое, любящее и милое сообщение на русском языке. Используй милые смайлики (сердечки, котики, звездочки). Пиши искренне, тепло, подними ей настроение, пожелай отличного дня или скажи, какая она потрясающая. Обращайся к ней ласково (Лиза, Лизонька, любимая).";
            const userPrompt = "Напиши короткое милое признание в любви для Лизы от Тёмы.";

            try {
                const response = await fetch('https://text.pollinations.ai/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: userPrompt }
                        ],
                        model: 'openai',
                        private: true,
                        stream: false
                    })
                });
                const text = await response.text();
                messageBox.innerHTML = text || "Лизонька, я тебя безумно сильно люблю! Ты — мое самое настоящее чудо. Твой Тёма. 💖";
                spawnHeartsBurst(15);
            } catch (error) {
                messageBox.innerHTML = "Лизочка, даже если интернет балуется, знай: мой мир крутится только вокруг тебя. Я люблю тебя сильнее всех на свете! Твой Тёма. 💖";
            } finally {
                genBtn.disabled = false;
            }
        }
    </script>
