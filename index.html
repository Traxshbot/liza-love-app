<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для моей любимой Лизы 💖</title>
    <!-- Подключаем милый шрифт -->
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ffe3e3 0%, #fff0f0 100%);
            font-family: 'Comfortaa', cursive;
            color: #4a4a4a;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Анимированные сердечки на фоне */
        .hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }
        .heart {
            position: absolute;
            display: block;
            list-style: none;
            width: 20px;
            height: 20px;
            background: rgba(255, 133, 162, 0.3);
            animation: animate 25s linear infinite;
            bottom: -150px;
            clip-path: path('M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z');
        }

        @keyframes animate {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; }
        }

        .container {
            z-index: 1;
            width: 90%;
            max-width: 400px;
            margin: 20px auto;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.3);
            padding: 25px;
            text-align: center;
            box-sizing: border-box;
            border: 2px solid rgba(255, 182, 193, 0.5);
        }

        h1 {
            font-size: 20px;
            color: #ff5e7e;
            margin-bottom: 20px;
        }

        /* Визуальный плеер */
        .player-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 25px;
            position: relative;
        }

        .vinyl-container {
            width: 130px;
            height: 130px;
            margin: 0 auto 15px auto;
            position: relative;
        }

        .vinyl {
            width: 100%;
            height: 100%;
            background: #282828;
            border-radius: 50%;
            border: 5px solid #ffb3b3;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: spin 5s linear infinite;
            animation-play-state: paused;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .vinyl-center {
            width: 40px;
            height: 40px;
            background: #ff85a2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }

        .track-info {
            margin-bottom: 15px;
        }
        .track-title {
            font-weight: bold;
            font-size: 16px;
        }
        .track-sub {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        /* Кнопки управления плеером */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .btn-play {
            background: #ff5e7e;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 94, 126, 0.4);
            transition: 0.2s;
        }
        .btn-play:active {
            transform: scale(0.95);
        }

        /* Секция записок с ИИ */
        .ai-section {
            background: #fff;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .message-box {
            min-height: 100px;
            border: 2px dashed #ffb3b3;
            border-radius: 15px;
            padding: 15px;
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 15px;
            background: #fffafa;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
        }

        .btn-generate {
            background: linear-gradient(45deg, #ff85a2, #ff5e7e);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            font-family: 'Comfortaa', cursive;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 94, 126, 0.3);
            transition: 0.2s;
            width: 100%;
        }
        .btn-generate:disabled {
            background: #ccc;
            box-shadow: none;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="hearts" id="heart-container"></div>

    <div class="container">
        <h1>Для любимой Лизы 🌸</h1>

        <!-- Плеер -->
        <div class="player-card">
            <div class="vinyl-container">
                <div class="vinyl" id="vinyl">
                    <div class="vinyl-center">❤️</div>
                </div>
            </div>
            <div class="track-info">
                <div class="track-title">Мелодия твоей улыбки</div>
                <div class="track-sub">С любовью от твоего парня ✨</div>
            </div>
            <div class="controls">
                <button class="btn-play" id="playBtn">▶️</button>
            </div>
            <!-- Скрытый аудиоэлемент (Замените ссылку на свою песню или lofi-радио) -->
            <audio id="audio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
        </div>

        <!-- Послания от ИИ -->
        <div class="ai-section">
            <div class="message-box" id="messageBox">
                Нажми на кнопку ниже, чтобы получить теплое послание, которое я создал специально для тебя... 💌
            </div>
            <button class="btn-generate" id="genBtn" onclick="generateMessage()">Сгенерировать милость ✨</button>
        </div>
    </div>

    <script>
        // Создание фоновых сердечек
        const container = document.getElementById('heart-container');
        for (let i = 0; i < 15; i++) {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDelay = Math.random() * 15 + 's';
            heart.style.animationDuration = Math.random() * 10 + 15 + 's';
            container.appendChild(heart);
        }

        // Логика плеера
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const vinyl = document.getElementById('vinyl');

        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playBtn.textContent = '⏸️';
                vinyl.style.animationPlayState = 'running';
            } else {
                audio.pause();
                playBtn.textContent = '▶️';
                vinyl.style.animationPlayState = 'paused';
            }
        });

        // Функция генерации писем от бесплатной нейросети (Pollinations AI)
        async function generateMessage() {
            const messageBox = document.getElementById('messageBox');
            const genBtn = document.getElementById('genBtn');
            
            messageBox.innerHTML = "✨ Создаю нежное послание для Лизоньки...";
            genBtn.disabled = true;

            const systemPrompt = "Ты — любящий парень девушки по имени Лиза. Твоя единственная цель — написать ей нежное, любящее, очень теплое и милое сообщение на русском языке. Используй милые смайлики (сердечки, котики, звездочки). Пиши искренне, романтично, подними ей настроение, пожелай отличного дня или скажи, какая она невероятная.";
            const userPrompt = "Напиши короткое, очень милое признание в любви для Лизы.";

            try {
                const response = await fetch('https://text.pollinations.ai/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: userPrompt }
                        ],
                        model: 'openai',
                        private: true,
                        stream: false
                    })
                });
                const text = await response.text();
                messageBox.innerHTML = text || "Лизонька, я тебя очень сильно люблю! Ты — мое самое настоящее чудо. 💖";
            } catch (error) {
                messageBox.innerHTML = "Лизочка, даже если интернет не работает, знай: я люблю тебя сильнее всех на свете! Каждую секунду думаю только о тебе. 💖";
            } finally {
                genBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
